<div class="profile-container">
  <h1 class="mb-4">My Profile</h1>
  <div class="card">
    <div class="card-body">
      <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" formControlName="fullName" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" disabled>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" formControlName="phone">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" formControlName="dateOfBirth">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" formControlName="gender">
              <option value="">Select Gender</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Address</label>
          <textarea class="form-control" formControlName="address" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary me-2" [disabled]="isLoading">
          Save Changes
        </button>
        <button type="button" class="btn btn-danger" (click)="deleteAccount()">
          Delete Account
        </button>
      </form>
    </div>
  </div>
</div>
